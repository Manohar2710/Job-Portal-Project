<button
  class="auth-btn"
  type="submit"
  [class.auth-btn--loading]="loading"
  [disabled]="isDisabled"
  [attr.aria-busy]="loading"
  [attr.aria-disabled]="isDisabled"
>
  @if (loading) {
    <span class="auth-btn__spinner" aria-hidden="true"></span>
  }
  <span class="auth-btn__label">{{ label }}</span>
</button>
