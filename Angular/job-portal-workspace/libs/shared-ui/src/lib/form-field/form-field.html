<div class="form-field" [class.form-field--error]="hasError">
    <label class="jp-label form-field__label" [for]="label">
        {{label}}
    </label>

    <input
        class="form-field__input"
        [id]="label"
        [type]="type"
        [placeholder]="placeholder"
        [formControl]="$any(control)"
    />
    @if (hasError) {
        <span class="jp-text-error form-field__error" role="alert">
            {{errorMessage}}
        </span>
    }

</div>
