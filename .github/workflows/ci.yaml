name: Angular Monorepo CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
# This forces all "run" commands to execute inside your subfolder
defaults:
  run:
    working-directory: ./Angular/job-portal-workspace
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Crucial: Fetches all git history to compare changes

    - uses: actions/setup-node@v4
      with: 
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./Angular/job-portal-workspace/package-lock.json

    - run: npm ci

    # Example A: If using standard Angular Workspace architecture
    - name: Build Job Portal App
      run: npx ng build job-portal-app --configuration=production

    - uses: actions/upload-artifact@v4
      with: 
        name: dist
        path: ./Angular/job-portal-workspace/dist/

    # Example B: If using Nx Monorepo architecture (Highly Recommended)
    # - name: Build Only Changed Apps
    #   run: npx nx affected:build --base=origin/main
