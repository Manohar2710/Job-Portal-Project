spring:
    flyway:
       enabled: true
    application:
        name: job-portal-service

    datasource:
        driver-class-name: org.postgresql.Driver
        url: jdbc:postgresql://localhost:5432/job_portal_db
        username: postgres
        password: "0000"
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false  # SQL logging is handled by logback-spring.xml (org.hibernate.SQL logger)
        open-in-view: false # OpenInView set with false as with true/default
        # springboot will keep the db session open for every http request 
        # even during data serializationn  

security:
    jwt:
        secretKey: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970 # 256-bit Base64
        expiration: 86400000 #24 hours in mili seconds
        refresh-expiration: 604800000 # 7 days
        issuer: job-portal-service
    cors:
        allowed-origins:
        - http://localhost:4200
        - http://localhost:3000
        allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        allowed-headers: "*"
        allow-credentials: true
        max-age: 3600

# ─── Actuator & Tracing ───────────────────────────────────────────────────────
# micrometer-tracing-bridge-brave populates MDC "traceId"/"spanId" on every
# request.  Default sampling probability is 0.1 (10%); raise to 1.0 so every
# request gets a traceId in logs.  Lower this in high-volume production if needed.
management:
    server:
        port: 8081          # expose actuator on a separate port (not reachable via public ingress)
    tracing:
        sampling:
            probability: 1.0
    endpoints:
        web:
            exposure:
                include: health,info,metrics,prometheus
            base-path: /actuator
    endpoint:
        health:
            show-details: when-authorized   # full component details only for authenticated callers
            probes:
                enabled: true               # exposes /actuator/health/liveness and /actuator/health/readiness
    metrics:
        tags:
            application: ${spring.application.name}  # label every metric with the service name

# ─── Logging ──────────────────────────────────────────────────────────────────
# These levels act as the baseline fallback.
# logback-spring.xml <springProfile> blocks override them per active profile:
#   dev   → com.learning=DEBUG, org.hibernate.SQL=DEBUG
#   prod  → com.learning=INFO,  org.hibernate.SQL=WARN  (this file's values)
#   debug → com.learning=TRACE, full framework trace
logging:
    level:
        root: INFO
        com.learning: DEBUG                          # always verbose for our code
        org.springframework.web: WARN               # suppress Spring MVC noise
        org.springframework.security: WARN          # suppress Security filter chain noise
        org.hibernate.SQL: WARN                     # SQL off by default; dev profile enables it
        org.hibernate.orm.jdbc.bind: WARN           # bind params off by default
        org.flywaydb: INFO                          # migration events always visible
        io.jsonwebtoken: WARN                       # JWT library internals suppressed
        # Activated automatically by logback-spring.xml when profile=debug.
        # Listed here for visibility — has no effect unless profile=debug is active.
        org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG